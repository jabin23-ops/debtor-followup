<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Receivables Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#0f1f3d;--navy2:#162847;--navy3:#1e3560;--card:#1a2e52;
  --border:rgba(255,255,255,0.08);--text:#e8edf8;--muted:#8a9bc4;
  --overdue:#ff4d4d;--overdue-bg:rgba(255,77,77,0.12);
  --due:#ff8c00;--due-bg:rgba(255,140,0,0.12);
  --coming:#e6b800;--coming-bg:rgba(230,184,0,0.10);
  --current:#3ecf8e;--current-bg:rgba(62,207,142,0.10);
  --bad:#9ca3af;--bad-bg:rgba(156,163,175,0.12);
  --sister:#818cf8;--sister-bg:rgba(129,140,248,0.12);
  --pdc:#34d399;--azaiba:#60a5fa;--national:#f59e0b;
  --green:#34d399;--green-bg:rgba(52,211,153,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--navy);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 14px 8px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.hdr-title span{color:var(--muted);font-weight:400;font-size:12px;margin-left:5px}
.updated{font-size:10px;color:var(--muted)}
.filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px}
.filter-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:20px;padding:4px 11px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
.pill.active{color:#fff;border-color:transparent;font-weight:600}
.pill.active.all{background:var(--navy3)} .pill.active.ov{background:#c00000}
.pill.active.due{background:var(--due)} .pill.active.com{background:#9a7b00}
.pill.active.cur{background:#1a7a52}
.pill.active.az{background:rgba(96,165,250,0.2);color:var(--azaiba);border-color:var(--azaiba)}
.pill.active.nat{background:rgba(245,158,11,0.18);color:var(--national);border-color:var(--national)}
.pill.active.seg{background:var(--navy3)}

/* KPI */
.kpi-strip{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:10px 14px}
.kpi{background:var(--card);border-radius:9px;padding:9px 11px;border:1px solid var(--border)}
.kpi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.kpi-v{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.kpi-v.red{color:var(--overdue)}.kpi-v.ora{color:var(--due)}.kpi-v.yel{color:var(--coming)}.kpi-v.wh{color:var(--text)}

/* SECTIONS */
.sec-hdr{padding:5px 14px 3px;font-size:9px;text-transform:uppercase;letter-spacing:0.7px;color:var(--muted);border-top:1px solid var(--border);margin-top:3px;display:flex;justify-content:space-between}
.sec-hdr span{font-size:11px;font-weight:700;color:var(--text)}
.cards{padding:0 10px 6px;display:flex;flex-direction:column;gap:7px}

/* CARD */
.card{background:var(--card);border-radius:11px;border:1px solid var(--border);overflow:hidden}
.card-head{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-left{flex:1;min-width:0}
.card-tags{display:flex;gap:4px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:0.3px;text-transform:uppercase}
.OVERDUE{background:var(--overdue-bg);color:var(--overdue)}
.DUE{background:var(--due-bg);color:var(--due)}
.COMING{background:var(--coming-bg);color:var(--coming)}
.CURRENT{background:var(--current-bg);color:var(--current)}
.BADDEBT,.COURTCASE{background:var(--bad-bg);color:var(--bad)}
.SISTER{background:var(--sister-bg);color:var(--sister)}
.co-AZAIBA{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;background:rgba(96,165,250,0.15);color:var(--azaiba)}
.co-NATIONAL{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;background:rgba(245,158,11,0.15);color:var(--national)}
.pdc-tag{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;background:rgba(52,211,153,0.15);color:var(--pdc)}
.card-name{font-size:13px;font-weight:600;line-height:1.3;word-break:break-word}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.card-amt{font-size:16px;font-weight:800;letter-spacing:-0.5px}
.card-sub{font-size:9px;color:var(--muted)}
.chev{color:var(--muted);font-size:14px;margin-top:2px;transition:transform 0.2s;display:inline-block}
.card.open .chev{transform:rotate(180deg)}

/* DETAIL */
.card-detail{display:none;border-top:1px solid var(--border);padding:0 13px 12px}
.card.open .card-detail{display:block}
.det-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.det-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
.det-box{background:var(--navy);border-radius:7px;padding:7px 8px;text-align:center}
.det-box .dl{font-size:9px;color:var(--muted);margin-bottom:2px}
.det-box .dv{font-size:12px;font-weight:700}
.dv.ov{color:var(--overdue)}.dv.du{color:var(--due)}.dv.co{color:var(--coming)}
.dv.pd{color:var(--pdc)}.dv.gr{color:var(--current)}

/* credit / pdc info strip */
.info-strip{display:flex;gap:6px;margin:8px 0}
.info-chip{flex:1;background:var(--navy);border-radius:7px;padding:6px 8px;display:flex;align-items:center;gap:6px}
.info-chip .ic-icon{font-size:13px}
.info-chip .ic-body .ic-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.info-chip .ic-body .ic-val{font-size:11px;font-weight:700}
.ic-val.pdc-yes{color:var(--pdc)}.ic-val.pdc-no{color:var(--muted)}

.divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.ct-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct-label{font-size:9px;color:var(--muted);margin-bottom:2px}
.ct-name{font-size:12px;font-weight:600}
.call-btn{display:flex;align-items:center;gap:5px;background:var(--current-bg);border:1px solid rgba(62,207,142,0.25);color:var(--current);border-radius:20px;padding:7px 12px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap}
.action-btns{display:flex;gap:7px;margin-top:10px}
.stmt-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:var(--text);border-radius:20px;padding:8px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s}
.stmt-btn:active{background:rgba(255,255,255,0.12)}.stmt-btn.loading{opacity:0.6;pointer-events:none}
.missing{font-size:11px;color:var(--overdue);background:var(--overdue-bg);border-radius:7px;padding:6px 9px;margin-top:6px}
.notes{margin-top:6px;font-size:10px;color:var(--muted);background:var(--navy);border-radius:6px;padding:5px 9px;line-height:1.5}
.empty{text-align:center;padding:30px 14px;color:var(--muted);font-size:13px}

/* BOTTOM */
.bot{background:var(--navy2);border-top:1px solid var(--border);padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bot .bl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
.bot .bv{font-size:15px;font-weight:800}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">Receivables <span>Aging</span></div>
    <div class="updated">16 May 2026</div>
  </div>
  <div class="filter-row">
    <button class="pill active all" data-f="status" data-v="ALL">All</button>
    <button class="pill ov"  data-f="status" data-v="OVERDUE">🔴 Overdue</button>
    <button class="pill due" data-f="status" data-v="DUE">🟠 Due</button>
    <button class="pill com" data-f="status" data-v="COMING">🟡 Coming</button>
    <button class="pill cur" data-f="status" data-v="CURRENT">🟢 Current</button>
  </div>
  <div class="filter-row">
    <button class="pill active all" data-f="co" data-v="ALL">All Companies</button>
    <button class="pill az"  data-f="co" data-v="AZAIBA">Azaiba</button>
    <button class="pill nat" data-f="co" data-v="NATIONAL">National</button>
  </div>
  <div class="filter-row">
    <button class="pill active seg" data-f="seg" data-v="NORMAL">Normal only</button>
    <button class="pill seg"        data-f="seg" data-v="SISTER">+ Sister cos.</button>
    <button class="pill seg"        data-f="seg" data-v="ALL">Show all</button>
  </div>
</div>

<div class="kpi-strip">
  <div class="kpi"><div class="kpi-l">Total Outstanding</div><div class="kpi-v wh" id="kt">–</div></div>
  <div class="kpi"><div class="kpi-l">Overdue</div><div class="kpi-v red" id="ko">–</div></div>
  <div class="kpi"><div class="kpi-l">Due This Month</div><div class="kpi-v ora" id="kd">–</div></div>
  <div class="kpi"><div class="kpi-l">Coming Up</div><div class="kpi-v yel" id="kc">–</div></div>
</div>

<div id="root" style="flex:1"></div>

<div class="bot">
  <div><div class="bl">Showing</div><div class="bv" id="sc">–</div></div>
  <div style="text-align:right"><div class="bl">Net Outstanding</div><div class="bv" style="color:var(--overdue)" id="nt">–</div></div>
</div>
</div>

function vis(){
  return D.filter(d=>{
    if(aS!=='ALL'&&d.s!==aS)return false;

    if(aG==='NORMAL'&&d.sg!=='NORMAL')return false;

// ── PDF GENERATION ────────────────────────────────────────────────────────────
function sendStmt(evt,cardId){
  evt.stopPropagation();
  const btn=evt.currentTarget;
  btn.classList.add('loading'); btn.textContent='⏳ Generating...';
  const v=vis(); const sts=['OVERDUE','DUE','COMING','CURRENT','BAD DEBT','COURT CASE'];
  const stMap={};
  sts.forEach(s=>{v.filter(d=>d.s===s).forEach((d,i)=>{stMap[`c${s.replace(/[\s]/g,'')}_${i}`]=d;});});
  const d=stMap[cardId];
  if(!d){btn.classList.remove('loading');btn.textContent='📄 Send Statement';return;}
  setTimeout(()=>{
    try{
      const pdf=buildPDF(d);
      const fname=`Statement_${d.n.replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_')}_${d.co}.pdf`;
      const blob=pdf.output('blob');
      const file=new File([blob],fname,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:`Account Statement — ${d.n}`,
          text:`Account statement for ${d.n} as of ${TODAY_STR}.`}).catch(()=>pdf.save(fname));
      }else{pdf.save(fname);}
    }catch(e){console.error(e);alert('PDF error: '+e.message);}
    btn.classList.remove('loading'); btn.textContent='📄 Send Statement';
  },50);
}

function buildPDF(d){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const PW=210,PH=297,LM=18,RM=18,W=PW-LM-RM;
  const co=CO[d.co]||CO['NATIONAL'];
  const CP=d.credit_period;

  const navy=[15,31,61],navy2=[30,53,96],red=[192,0,0],dgreen=[27,94,32],
        blue=[21,101,192],dgray=[89,89,89],mgray=[180,180,180],lgray=[242,242,242],
        white=[255,255,255],yel=[255,217,102],redl=[255,204,204],bluel=[219,234,254];

  const setF=(sz,style='normal',clr=[0,0,0])=>{
    doc.setFontSize(sz);doc.setFont('helvetica',style);doc.setTextColor(...clr);
  };
  const fmt_=v=>v.toFixed(3).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const coMeta=[co.cr,co.po,co.addr,co.vatin].filter(Boolean).join('  |  ');

  let y=14;

  // Letterhead
  setF(16,'bold',navy);doc.text(co.name,LM,y);y+=6;
  setF(8,'normal',dgray);doc.text(coMeta,LM,y);y+=4;
  doc.setDrawColor(...navy);doc.setLineWidth(0.8);doc.line(LM,y,PW-RM,y);y+=3;
  // title
  setF(13,'bold',navy);doc.text('STATEMENT OF ACCOUNT',LM,y+4);
  setF(9,'normal',dgray);doc.text('As of '+TODAY_STR,PW-RM,y+4,{align:'right'});y+=8;
  setF(7.5,'normal',dgray);
  doc.text('This is a computer-generated statement. For queries, please contact our accounts team.',LM,y);y+=4;
  doc.setDrawColor(...mgray);doc.setLineWidth(0.3);doc.line(LM,y,PW-RM,y);y+=5;

  // Debtor info
  const firstDate=d.inv.length>0?d.inv[0].date:'01 Jan 2026';
  setF(10,'bold',[0,0,0]);doc.text(`DEBTOR:  ${d.n}`,LM,y);
  setF(9,'normal',[0,0,0]);doc.text('Statement Date:  '+TODAY_STR,PW-RM,y,{align:'right'});y+=5;
  setF(9,'normal',dgray);
  doc.text(`Period:  ${firstDate} to ${TODAY_STR}  |  Credit Terms: ${CP} days`,LM,y);
  if(d.cn)doc.text(`Contact:  ${d.cp_name}  |  ${d.cn}`,PW-RM,y,{align:'right'});
  y+=8;

  // 5 KPI boxes — OVERDUE = credit-period-based
  const kpiC=[navy2,red,dgreen,blue,navy];
  const kpiL=['TOTAL OUTSTANDING','OVERDUE','NOT OVERDUE','PDC IN HAND','NET BALANCE'];
  const kpiV=[d.t,d.cp_ov,d.cp_not_ov,d.p,d.net];
  const bw=W/5;
  kpiC.forEach((clr,i)=>{
    const x=LM+i*bw;
    doc.setFillColor(...clr);doc.rect(x,y,bw,14,'F');
    if(i<4){doc.setDrawColor(...white);doc.setLineWidth(0.3);doc.line(x+bw,y,x+bw,y+14);}
    setF(7.5,'bold',white);doc.text(kpiL[i],x+bw/2,y+5,{align:'center'});
    const vc=i===4?yel:white;
    setF(9.5,'bold',vc);doc.text('OMR '+fmt_(kpiV[i]),x+bw/2,y+11,{align:'center'});
  });
  y+=18;
  // legend
  setF(8,'normal',red);doc.text('■',LM,y);
  setF(8,'normal',dgray);doc.text(' Overdue (past credit terms)',LM+3,y);
  const lw1=doc.getTextWidth(' Overdue (past credit terms)')+8;
  setF(8,'normal',dgreen);doc.text('■',LM+lw1+3,y);
  setF(8,'normal',dgray);doc.text(' Not Overdue',LM+lw1+6,y);
  const lw2=doc.getTextWidth(' Not Overdue')+8;
  setF(8,'normal',blue);doc.text('■',LM+lw1+lw2+6,y);
  setF(8,'normal',dgray);doc.text(' PDC Received',LM+lw1+lw2+9,y);
  y+=7;

  // Invoice table
  const cw=[W*0.11,W*0.17,W*0.33,W*0.16,W*0.12,W*0.11];
  const cx=[LM,...cw.slice(0,-1).reduce((a,v,i)=>[...a,a[i]+v],[LM])];
  // cx[i] = left x of col i
  const cols=[LM]; for(let i=0;i<cw.length;i++) cols.push(cols[i]+cw[i]);
  const aln=['l','l','l','r','c','c'];
  const hdrs2=['Date','Reference No.','Party Name','Amount (OMR)','Due Date','Days OD'];
  const RH=6.5;

  const drawTxt=(txt,ci,yi,bold,clr)=>{
    const x=cols[ci],w2=cw[ci];
    setF(8.5,bold?'bold':'normal',clr||[0,0,0]);
    let disp=String(txt||'');
    if(ci===2){while(disp.length>3&&doc.getTextWidth(disp)>w2-4)disp=disp.slice(0,-1);}
    if(ci===4&&aln[ci]==='r'){doc.text(disp,cols[ci+1]-1,yi,{align:'right'});}
    else if(aln[ci]==='r'){doc.text(disp,cols[ci+1]-1,yi,{align:'right'});}
    else if(aln[ci]==='c'){doc.text(disp,x+w2/2,yi,{align:'center'});}
    else doc.text(disp,x+1,yi);
  };

  // header row
  doc.setFillColor(...navy);doc.rect(LM,y,W,RH,'F');
  hdrs2.forEach((h,i)=>drawTxt(h,i,y+4.5,true,white));y+=RH;

  d.inv.forEach((inv,ri)=>{
    const isOd=inv.is_od;
    if(isOd){doc.setFillColor(...redl);}
    else if(ri%2===0){doc.setFillColor(...lgray);}
    else{doc.setFillColor(255,255,255);}
    doc.rect(LM,y,W,RH,'F');
    doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.line(LM,y+RH,PW-RM,y+RH);

    // compute due date = invoice_date + credit_period
    const invDateParts=inv.date.split('-');
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const invDateObj=new Date(2000+parseInt(invDateParts[2]),months[invDateParts[1]],parseInt(invDateParts[0]));
    const dueDateObj=new Date(invDateObj); dueDateObj.setDate(dueDateObj.getDate()+CP);
    const mns=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dueDateStr=`${String(dueDateObj.getDate()).padStart(2,'0')}-${mns[dueDateObj.getMonth()]}-${String(dueDateObj.getFullYear()).slice(2)}`;

    const row=[inv.date,inv.ref,inv.party,fmt_(inv.amount),dueDateStr,
               isOd?String(inv.days_od):'—'];
    row.forEach((v,i)=>{
      const clr=(i===5&&isOd)?red:(i===5?dgray:null);
      drawTxt(v,i,y+4.5,i===5&&isOd,clr);
    });
    y+=RH;
    if(y>PH-50){doc.addPage();y=20;
      doc.setFillColor(...navy);doc.rect(LM,y,W,RH,'F');
      hdrs2.forEach((h,i)=>drawTxt(h,i,y+4.5,true,white));y+=RH;}
  });

  // total
  doc.setFillColor(...lgray);doc.rect(LM,y,W,RH,'F');
  doc.setDrawColor(...mgray);doc.setLineWidth(0.5);doc.line(LM,y,PW-RM,y);
  setF(9,'bold',[0,0,0]);
  doc.text('TOTAL OUTSTANDING',cols[2]+1,y+4.5);
  doc.text(fmt_(d.t),cols[4]-1,y+4.5,{align:'right'});
  y+=RH+5;

  // PDC section
  if(y>PH-60){doc.addPage();y=20;}
  setF(9.5,'bold',navy);doc.text('POST-DATED CHEQUES (PDC) IN HAND',LM,y);y+=2;
  doc.setDrawColor(...navy);doc.setLineWidth(0.7);doc.line(LM,y,PW-RM,y);y+=5;

  if(d.pdc&&d.pdc.length>0){
    const pw2=[W*0.13,W*0.13,W*0.25,W*0.16,W*0.33];
    const pc=[LM]; for(let i=0;i<pw2.length;i++) pc.push(pc[i]+pw2[i]);
    const ph2=['Cheque Date','Cheque No.','Party Name','Amount (OMR)','Invoice Ref.'];
    const pa=['c','c','l','r','l'];
    doc.setFillColor(...blue);doc.rect(LM,y,W,RH,'F');
    ph2.forEach((h,i)=>{
      setF(8.5,'bold',white);
      if(pa[i]==='r') doc.text(h,pc[i+1]-1,y+4.5,{align:'right'});
      else if(pa[i]==='c') doc.text(h,(pc[i]+pc[i+1])/2,y+4.5,{align:'center'});
      else doc.text(h,pc[i]+1,y+4.5);
    });y+=RH;
    let pdcTot=0;
    d.pdc.forEach((p,ri)=>{
      pdcTot+=p.amount;
      if(ri%2===0){doc.setFillColor(...bluel);}else{doc.setFillColor(255,255,255);}
      doc.rect(LM,y,W,RH,'F');
      doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.line(LM,y+RH,PW-RM,y+RH);
      [p.cheque_date,p.cheque,p.party,fmt_(p.amount),p.inv_refs].forEach((v,i)=>{
        setF(8.5,'normal',[0,0,0]);
        let disp=String(v||'');
        if((i===2||i===4)&&doc.getTextWidth(disp)>pw2[i]-4){
          while(disp.length>3&&doc.getTextWidth(disp)>pw2[i]-4)disp=disp.slice(0,-1);}
        if(pa[i]==='r') doc.text(disp,pc[i+1]-1,y+4.5,{align:'right'});
        else if(pa[i]==='c') doc.text(disp,(pc[i]+pc[i+1])/2,y+4.5,{align:'center'});
        else doc.text(disp,pc[i]+1,y+4.5);
      });y+=RH;
      if(y>PH-40){doc.addPage();y=20;}
    });
    doc.setFillColor(...lgray);doc.rect(LM,y,W,RH,'F');
    doc.setDrawColor(...mgray);doc.setLineWidth(0.5);doc.line(LM,y,PW-RM,y);
    setF(9,'bold',[0,0,0]);doc.text('TOTAL PDC',pc[2]+1,y+4.5);
    doc.text(fmt_(pdcTot),pc[4]-1,y+4.5,{align:'right'});y+=RH+5;
  }else{
    setF(9,'normal',dgray);doc.text('No post-dated cheques on record for this account.',LM,y);y+=8;
  }

  // Net balance
  if(y>PH-20){doc.addPage();y=20;}
  doc.setFillColor(...navy);doc.rect(LM,y,W,10,'F');
  setF(10,'bold',white);doc.text('NET BALANCE (Outstanding – PDC)',LM+4,y+6.5);
  setF(11,'bold',yel);doc.text('OMR '+fmt_(d.net),PW-RM-2,y+6.5,{align:'right'});

  // footers
  const pages=doc.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setDrawColor(...mgray);doc.setLineWidth(0.3);doc.line(LM,PH-12,PW-RM,PH-12);
    setF(7,'normal',dgray);
    doc.text(`Page ${p} of ${pages}  |  ${co.name}  |  Printed: ${TODAY_STR}`,PW/2,PH-8,{align:'center'});
  }
  return doc;
}

document.querySelectorAll('[data-f]').forEach(b=>{
  b.addEventListener('click',()=>{
    const f=b.dataset.f,v=b.dataset.v;
    document.querySelectorAll(`[data-f="${f}"]`).forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if(f==='status')aS=v; else if(f==='co')aC=v; else aG=v;
    render();
  });
});
render();
</script>
</body>
</html>
